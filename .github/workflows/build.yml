name: Build installers

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            args: --mac --arm64
          - os: macos-14
            arch: x64
            args: --mac --x64
          - os: windows-latest
            arch: x64
            args: --win --x64
          - os: ubuntu-latest
            arch: x64
            args: --linux --x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Build Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse2
      - run: npx electron-builder ${{ matrix.args }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: openclaude-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml
            dist/*.blockmap
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts
      - name: Generate release body
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PREV=$(git tag --sort=-creatordate | grep '^v' | sed -n "2p" || echo "")
          cat > artifacts/RELEASE_BODY.md <<EOF
          ## Changes in v${TAG}

          EOF
          if [ -n "$PREV" ]; then
            git log --oneline --no-decorate "$PREV..HEAD" 2>/dev/null | head -50 >> artifacts/RELEASE_BODY.md
          else
            git log --oneline --no-decorate -20 >> artifacts/RELEASE_BODY.md
          fi
          cat >> artifacts/RELEASE_BODY.md <<EOF

          ---

          ## Setup guide

          See TUTORIAL.md (attached to this release) or the [online version](https://github.com/Superior-curtis/OpenClaude/blob/main/TUTORIAL.md).

          **Video walkthrough:** https://youtu.be/9q-l-EwG6jY
          EOF
      - name: Copy TUTORIAL.md to release
        run: cp TUTORIAL.md artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: artifacts/RELEASE_BODY.md
          draft: false
          append_body: false
